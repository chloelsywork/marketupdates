async function callClaude(userMessage, systemPrompt) {
  const messages = [{ role: 'user', content: userMessage }];
  let finalText = '';
  for (let i = 0; i < 6; i++) {
    const res = await fetch('/.netlify/functions/claude', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1500,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        system: systemPrompt,
        messages
      })
    });
    const data = await res.json();
    if (!data.content) throw new Error(data.error?.message || 'API error');
    const textBlocks = data.content.filter(b => b.type === 'text');
    if (textBlocks.length) finalText = textBlocks.map(b => b.text).join('');
    if (data.stop_reason === 'end_turn') break;
    if (data.stop_reason === 'tool_use') {
      messages.push({ role: 'assistant', content: data.content });
      const results = data.content
        .filter(b => b.type === 'tool_use')
        .map(b => ({ type: 'tool_result', tool_use_id: b.id, content: JSON.stringify(b.input) }));
      messages.push({ role: 'user', content: results });
    } else break;
  }
  return finalText || "Couldn't fetch data right now — try again.";
}

function Spinner({ color='#6366f1' }) {
  return (
    <div style={{ display:'flex', alignItems:'center', gap:10, color:'#888', fontSize:14, padding:'20px 0' }}>
      <div style={{ width:18, height:18, border:'2px solid #eee', borderTopColor:color, borderRadius:'50%', animation:'spin 0.8s linear infinite' }}/>
      Fetching the latest info...
    </div>
  );
}

function ResultBox({ text, loading, placeholder }) {
  if (loading) return <Spinner />;
  if (!text) return <p style={{ color:'#bbb', fontSize:14 }}>{placeholder}</p>;
  return (
    <div style={{ fontSize:14, lineHeight:1.85, color:'#374151' }}>
      {text.split('\n').map((line, i) => {
        const c = line.replace(/\*\*/g, '');
        if (!c.trim()) return <div key={i} style={{ height:8 }}/>;
        if (/^#{1,3}\s/.test(c)) return <div key={i} style={{ fontWeight:700, fontSize:15, color:'#111827', marginTop:18, marginBottom:6 }}>{c.replace(/^#+\s*/,'')}</div>;
        if (/^[-•]\s/.test(c)) return <div key={i} style={{ display:'flex', gap:8, marginBottom:4, paddingLeft:4 }}><span style={{ color:'#6366f1', flexShrink:0 }}>›</span><span>{c.replace(/^[-•]\s*/,'')}</span></div>;
        if (/^\d+\.\s/.test(c)) return <div key={i} style={{ marginBottom:4, paddingLeft:4 }}>{c}</div>;
        return <div key={i}>{c}</div>;
      })}
    </div>
  );
}

function Chip({ label, active, onClick, color='#6366f1' }) {
  return (
    <button onClick={onClick} style={{ background:active?color:'#f3f4f6', color:active?'#fff':'#6b7280', border:'none', borderRadius:20, padding:'6px 14px', fontSize:13, cursor:'pointer', fontWeight:active?600:400, transition:'all 0.15s' }}>
      {label}
    </button>
  );
}

function exportMarketPDF(snapshots, date, contact={}) {
  const G='#3d6b4f', LG='#8fbc8f', DARK='#2c3e2d';
  const COLORS=['#3d6b4f','#0ea5e9','#f59e0b','#ef4444','#8b5cf6','#ec4899'];
  const month = new Date().toLocaleString('default',{month:'long'});
  const year = new Date().getFullYear();

  // topic config — image URL from Unsplash (free, no key needed), color, title
  const topicMeta = {
    'global markets today':{ title:'Markets Today', emoji:'🌍', color:'#3d6b4f',
      img:'https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?w=800&q=80&auto=format&fit=crop' },
    'Singapore economy and SGX':{ title:'Singapore', emoji:'🇸🇬', color:'#0ea5e9',
      img:'https://images.unsplash.com/photo-1525625293386-3f8f99389edd?w=800&q=80&auto=format&fit=crop' },
    'US Federal Reserve and interest rates':{ title:'Interest Rates', emoji:'📈', color:'#7c3aed',
      img:'https://images.unsplash.com/photo-1526304640581-d334cdbbf45e?w=800&q=80&auto=format&fit=crop' },
    'global economy':{ title:'Global Economy', emoji:'🌐', color:'#0891b2',
      img:'https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=800&q=80&auto=format&fit=crop' },
    'commodities gold oil':{ title:'Gold & Oil', emoji:'🛢️', color:'#d97706',
      img:'https://images.unsplash.com/photo-1611879529558-2e6a1ea86810?w=800&q=80&auto=format&fit=crop' },
    'cryptocurrency Bitcoin':{ title:'Crypto', emoji:'₿', color:'#f97316',
      img:'https://images.unsplash.com/photo-1621416894569-0f39ed31d247?w=800&q=80&auto=format&fit=crop' },
  };

  function clean(text) {
    return text.replace(/\*\*/g,'').replace(/^#+\s*/gm,'');
  }
  function extractSummary(text) {
    const c = clean(text);
    // Try to find OVERVIEW section first
    const overviewMatch = c.match(/OVERVIEW[:\s]+(.+?)(?=KEY DEVELOPMENTS|WHAT IT MEANS|WHAT TO WATCH|$)/s);
    if (overviewMatch) return overviewMatch[1].trim().slice(0,400);
    // fallback: first non-bullet paragraph
    const paras = c.split('\n').map(l=>l.trim()).filter(l=>l.length>60 && !/^[-•›\d]/.test(l) && !/^[A-Z\s]{5,}:/.test(l));
    return paras.slice(0,2).join(' ').slice(0,400);
  }
  function extractPoints(text) {
    const c = clean(text);
    const bullets = c.split('\n')
      .map(l => l.replace(/^[-•›]\s*/,'').trim())
      .filter(l => l.length > 20 && l.length < 280 && !/^[A-Z\s]{5,}:/.test(l) && !/^OVERVIEW/.test(l));
    if (bullets.length >= 5) return bullets.slice(0,10);
    // fallback
    const sentences = c.replace(/\n/g,' ').split(/(?<=[.!?])\s+/)
      .map(s=>s.replace(/^[-•›\d.]\s*/,'').trim())
      .filter(s=>s.length>40 && s.length<280);
    return [...new Set([...bullets,...sentences])].slice(0,10);
  }
  function extractHeadline(text) {
    const c = clean(text);
    const overviewMatch = c.match(/OVERVIEW[:\s]+(.+?)[.!?]/s);
    if (overviewMatch) return overviewMatch[1].trim().slice(0,120);
    return c.split(/[.!?]/).map(s=>s.trim()).filter(s=>s.length>30&&s.length<130)[0] || '';
  }

  const badges = snapshots.map((s,i) => {
    const m = topicMeta[s.topic] || { title:s.topic, emoji:'📊', color:COLORS[i%COLORS.length] };
    return `<span class="badge" style="border:1.5px solid ${m.color};color:${m.color};">${m.emoji} ${m.title}</span>`;
  }).join('');

  const cards = snapshots.map((s,i) => {
    const m = topicMeta[s.topic] || { title:s.topic, emoji:'📊', color:COLORS[i%COLORS.length], img:'' };
    const headline = extractHeadline(s.text);

    // Render full rich text as proper HTML
    function renderFullText(text) {
      const c = text.replace(/\*\*/g,'');
      const lines = c.split('\n');
      let html = '';
      for (const line of lines) {
        const t = line.trim();
        if (!t) { html += '<div style="height:6px"></div>'; continue; }
        // Section headers (bold lines or ALL CAPS lines)
        if (/^[A-Z][A-Za-z &]+:$/.test(t) || /^#{1,3}\s/.test(t)) {
          html += '<div style="font-weight:700;font-size:13px;color:'+m.color+';margin:14px 0 6px;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid #e5e7eb;padding-bottom:4px;">'+t.replace(/^#+\s*/,'').replace(/:$/,'')+'</div>';
        }
        // Bullets
        else if (/^[-•›]\s/.test(t)) {
          html += '<div style="display:flex;gap:8px;margin-bottom:7px;align-items:flex-start;"><span style="color:'+m.color+';font-size:16px;line-height:1.4;flex-shrink:0;">›</span><span style="font-size:12.5px;line-height:1.65;color:#374151;">'+t.replace(/^[-•›]\s*/,'')+'</span></div>';
        }
        // Numbered list items
        else if (/^\d+\.\s/.test(t)) {
          const num = t.match(/^(\d+)\.\s/)[1];
          const txt = t.replace(/^\d+\.\s/,'');
          html += '<div style="display:flex;gap:9px;margin-bottom:7px;align-items:flex-start;"><div style="width:20px;height:20px;border-radius:50%;background:'+m.color+';color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;">'+num+'</div><span style="font-size:12.5px;line-height:1.65;color:#374151;">'+txt+'</span></div>';
        }
        // Regular paragraph
        else {
          html += '<p style="font-size:12.5px;line-height:1.7;color:#374151;margin-bottom:8px;">'+t+'</p>';
        }
      }
      return html;
    }

    return '<div class="card" style="page-break-inside:avoid;"><div class="card-img" style="background:'+m.color+';">'+
      (m.img ? '<img src="'+m.img+'" alt="'+m.title+'" onerror="this.style.display=\'none\'"/>' : '')+
      '<div class="card-img-overlay">'+
        '<div class="card-emoji">'+m.emoji+'</div>'+
        '<div class="card-title">'+m.title+'</div>'+
        (headline ? '<div class="card-hl">'+headline+'</div>' : '')+
      '</div>'+
    '</div>'+
    '<div class="card-body">'+renderFullText(s.text)+'</div>'+
    '</div>';
  }).join('');

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">

  const w = window.open('','_blank','width=980,height=820,scrollbars=yes');
  if (!w) { alert('Please allow pop-ups to export the PDF.'); return; }
  w.document.write(html);
  w.document.close();
  setTimeout(() => { w.focus(); w.print(); }, 1200);
}

            {preview && !loading && <button onClick={exportDoc} style={{ background:'#fff', color:'#6366f1', border:'1.5px solid #6366f1', borderRadius:8, padding:'7px 16px', fontSize:13, fontWeight:600, cursor:'pointer' }}>⬇ Download as Word</button>}
          </div>
          <div style={{ background:'#fff', borderRadius:12, padding:'40px 48px', border:'1px solid #e5e7eb', boxShadow:'0 4px 24px rgba(0,0,0,.06)', fontFamily:'Georgia,serif' }}>
            {firmName && <div style={{ fontSize:18, fontWeight:700, color:'#2c3e50', marginBottom:2 }}>{firmName}</div>}
            {advisorName && <div style={{ fontSize:12, color:'#9ca3af', marginBottom:24 }}>{advisorName} · {month}</div>}
            <div style={{ borderTop:'1px solid #e5e7eb', marginBottom:20 }}/>
            {loading ? <Spinner color="#6366f1"/> : <ResultBox text={preview} loading={false} placeholder=""/>}
            {preview && !loading && <div style={{ marginTop:32, paddingTop:16, borderTop:'1px solid #f0f0f0', fontSize:11, color:'#d1d5db' }}>For informational purposes only. Not financial advice.</div>}
          </div>
        </div>
      )}
    </div>
  );
}

// ── MAIN APP ─────────────────────────────────────────────────────────────────

function App() {
  const [tab, setTab] = React.useState(0);
  return (
    <div style={{ background:'#f8f7f5', minHeight:'100vh' }}>
      <div style={{ background:'#fff', borderBottom:'1px solid #f0f0f0', padding:'18px 32px', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div>
          <div style={{ fontSize:20, fontFamily:"'DM Serif Display',serif", color:'#111827', letterSpacing:'-0.3px' }}>Clearview <span style={{ color:'#6366f1' }}>Insights</span></div>
          <div style={{ fontSize:11, color:'#9ca3af', marginTop:1 }}>Your markets, in plain English</div>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <div style={{ width:7, height:7, borderRadius:'50%', background:'#10b981' }}/>
          <span style={{ fontSize:12, color:'#6b7280' }}>Live data</span>
        </div>
      </div>
      <div style={{ background:'#fff', borderBottom:'1px solid #f0f0f0', padding:'0 32px', display:'flex', overflowX:'auto' }}>
        {TABS.map((t,i) => (
          <button key={t.id} onClick={() => setTab(i)} style={{ background:'transparent', border:'none', borderBottom:`2px solid ${tab===i?'#6366f1':'transparent'}`, color:tab===i?'#6366f1':'#6b7280', padding:'14px 16px', fontSize:13, fontWeight:tab===i?600:400, cursor:'pointer', whiteSpace:'nowrap', display:'flex', alignItems:'center', gap:6 }}>
            <span>{t.emoji}</span>{t.label}
          </button>
        ))}
      </div>
      <div style={{ maxWidth:860, margin:'0 auto', padding:'32px 24px', animation:'fadeIn 0.25s ease' }}>
        {tab===0 && <WhatsHappeningTab/>}
        {tab===1 && <NewsByIndustryTab/>}
        {tab===2 && <LookUpTab/>}
        {tab===3 && <QuickScanTab/>}
        {tab===4 && <ClientLetterTab/>}
      </div>
      <div style={{ textAlign:'center', padding:'20px 0 32px', fontSize:11, color:'#d1d5db' }}>For informational purposes only · Not financial advice · Clearview Insights</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
