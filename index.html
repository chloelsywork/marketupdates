async function callClaude(userMessage, systemPrompt) {
  const messages = [{ role: 'user', content: userMessage }];
  let finalText = '';
  for (let i = 0; i < 6; i++) {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1500,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        system: systemPrompt,
        messages
      })
    });
    const data = await res.json();
    if (!data.content) throw new Error(data.error?.message || 'API error');
    const textBlocks = data.content.filter(b => b.type === 'text');
    if (textBlocks.length) finalText = textBlocks.map(b => b.text).join('');
    if (data.stop_reason === 'end_turn') break;
    if (data.stop_reason === 'tool_use') {
      messages.push({ role: 'assistant', content: data.content });
      const results = data.content
        .filter(b => b.type === 'tool_use')
        .map(b => ({ type: 'tool_result', tool_use_id: b.id, content: JSON.stringify(b.input) }));
      messages.push({ role: 'user', content: results });
    } else break;
  }
  return finalText || "Couldn't fetch data right now — try again.";
}

}

function ResultBox({ text, loading, placeholder }) {
  if (loading) return <Spinner />;
  if (!text) return <p style={{ color:'#bbb', fontSize:14 }}>{placeholder}</p>;
  return (
    <div style={{ fontSize:14, lineHeight:1.85, color:'#374151' }}>
      {text.split('\n').map((line, i) => {
        if (!line.trim()) return <div key={i} style={{ height:8 }}/>;
        if (/^#{1,3}\s/.test(line)) return <div key={i} style={{ fontWeight:700, fontSize:15, color:'#111827', marginTop:18, marginBottom:6 }}>{line.replace(/^#+\s*/,'')}</div>;
        if (/^\*\*(.+)\*\*$/.test(line)) return <div key={i} style={{ fontWeight:600, color:'#1f2937', marginTop:12 }}>{line.replace(/\*\*/g,'')}</div>;
        if (/^[-•]\s/.test(line)) return <div key={i} style={{ display:'flex', gap:8, marginBottom:4, paddingLeft:4 }}><span style={{ color:'#6366f1', flexShrink:0 }}>›</span><span>{line.replace(/^[-•]\s*/,'')}</span></div>;
        if (/^\d+\.\s/.test(line)) return <div key={i} style={{ marginBottom:4, paddingLeft:4 }}>{line}</div>;
        return <div key={i}>{line}</div>;
      })}
    </div>
  );
}

function Chip({ label, active, onClick, color='#6366f1' }) {

  const COLORS=['#3d6b4f','#0ea5e9','#f59e0b','#ef4444','#8b5cf6','#ec4899'];

  const meta = {
    'global markets today':                  { title:'Markets Today',    emoji:'🌍', icon:'📊' },
    'Singapore economy and SGX':             { title:'Singapore',        emoji:'🇸🇬', icon:'🏙️' },
    'US Federal Reserve and interest rates': { title:'Interest Rates',   emoji:'📈', icon:'🏦' },
    'global economy':                        { title:'Global Economy',   emoji:'🌐', icon:'🌐' },
    'commodities gold oil':                  { title:'Gold & Oil',       emoji:'🛢️', icon:'⚡' },
    'cryptocurrency Bitcoin':                { title:'Crypto',           emoji:'₿',  icon:'💎' },
  };

  // Clean text: strip **, ##, bullet markers — extract up to 4 key points
  function extractPoints(text) {
    const clean = text
      .replace(/\*\*/g, '')
      .replace(/^#+\s*/gm, '')
      .split('\n')
      .map(l => l.replace(/^[-•›]\s*/, '').trim())
      .filter(l => l.length > 20 && l.length < 180);
    return clean.slice(0, 4);
  }

  // Pull out a short headline sentence from the text
  function extractHeadline(text) {
    const clean = text.replace(/\*\*/g,'').replace(/^#+\s*/gm,'');
    const sentences = clean.split(/[.!?]/).map(s=>s.trim()).filter(s=>s.length>30 && s.length<120);
    return sentences[0] || '';
  }

  const topicColors = {
    'global markets today':'#3d6b4f',
    'Singapore economy and SGX':'#0ea5e9',
    'US Federal Reserve and interest rates':'#7c3aed',
    'global economy':'#0891b2',
    'commodities gold oil':'#d97706',
    'cryptocurrency Bitcoin':'#f97316',
  };

  // Build each topic as a visual infographic block
  const blocks = snapshots.map((s, i) => {
    const m = meta[s.topic] || { title: s.topic, emoji:'📊', icon:'📊' };
    const color = topicColors[s.topic] || COLORS[i % COLORS.length];
    const points = extractPoints(s.text);
    const headline = extractHeadline(s.text);

    const pointsHtml = points.map((p,pi) => `

      </div>`).join('');

      <div class="block-body">
        ${pointsHtml}
      </div>
    </div>`;
  }).join('');

  // Topic count badge row
  const badges = snapshots.map((s,i) => {
    const m = meta[s.topic] || { title:s.topic, emoji:'📊' };

      <div style={{ display:'flex', gap:8, flexWrap:'wrap', marginBottom:16 }}>

          <div key={t.id} style={{ position:'relative' }}>
            <Chip label={t.label} active={topic===t.id} onClick={() => fetchTopic(t.id)} />
            {cache[t.id] && <span style={{ position:'absolute', top:-4, right:-4, width:10, height:10, borderRadius:'50%', background:'#3d6b4f', border:'2px solid #f8f7f5' }}/>}
          </div>
        ))}
      </div>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', background:canExport?'#f0f7f3':'#f9fafb', border:`1.5px solid ${canExport?'#3d6b4f':'#e5e7eb'}`, borderRadius:10, padding:'12px 16px', marginBottom:24, transition:'all 0.3s' }}>
        <div style={{ fontSize:13, color:canExport?'#3d6b4f':'#9ca3af' }}>
          {canExport ? `${fetched.length} topic${fetched.length!==1?'s':''} ready — export as a styled PDF` : 'Load a topic above, then export as PDF'}
        </div>
        <button onClick={() => canExport && setShowModal(true)} disabled={!canExport} style={{ background:canExport?'#3d6b4f':'#e5e7eb', color:canExport?'#fff':'#9ca3af', border:'none', borderRadius:8, padding:'9px 20px', fontSize:13, fontWeight:600, cursor:canExport?'pointer':'not-allowed', marginLeft:12 }}>
          🖨️ Export PDF
        </button>
      </div>
      <div style={{ background:'#fafafa', borderRadius:12, padding:24, border:'1px solid #f0f0f0' }}>
        <ResultBox text={text} loading={loading} placeholder="Pick a topic above to get started." />
      </div>
    </div>
  );
}

// ── TAB 2: NEWS BY INDUSTRY ──────────────────────────────────────────────────

  const [text, setText] = React.useState('');
  const [loading, setLoading] = React.useState(false);

    setActive(ind.id); setLoading(true); setText('');
    try {
      const r = await callClaude(`Search for the latest news in the ${ind.label} sector. Write a summary that: 1) highlights 4-6 biggest stories in plain language, 2) explains why each matters to investors, 3) ends with a "What to watch" section. No jargon.`, SYSTEM);

        {INDUSTRIES.map(ind => (

            <span style={{ fontSize:22 }}>{ind.emoji}</span>
            <span style={{ fontSize:11, fontWeight:600, color:active===ind.id?'#fff':'#374151', textAlign:'center', lineHeight:1.3 }}>{ind.label}</span>
          </button>
        ))}
      </div>
      {(text||loading) && (
        <div style={{ background:'#fafafa', borderRadius:12, padding:24, border:'1px solid #f0f0f0' }}>
          {active && !loading && (
            <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:16 }}>
              <span style={{ fontSize:20 }}>{INDUSTRIES.find(i=>i.id===active)?.emoji}</span>
              <span style={{ fontWeight:700, fontSize:16, color:'#111' }}>{INDUSTRIES.find(i=>i.id===active)?.label} — Latest News</span>
            </div>
          )}
          <ResultBox text={text} loading={loading} placeholder="" />
        </div>
      )}
      {!text && !loading && (
        <div style={{ textAlign:'center', padding:'40px 0', color:'#d1d5db' }}>
          <div style={{ fontSize:40, marginBottom:8 }}>👆</div>
          <div style={{ fontSize:14 }}>Choose an industry above</div>
        </div>
      )}
    </div>
  );
}

// ── TAB 3: LOOK UP ANYTHING ──────────────────────────────────────────────────

function LookUpTab() {
  const [query, setQuery] = React.useState('');
  const [text, setText] = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const [assetType, setAssetType] = React.useState('stock');
  const [activePreset, setActivePreset] = React.useState(null);

  const types = [
    { id:'stock',      label:'Stocks',          placeholder:'e.g. Apple, AAPL, DBS' },
    { id:'etf',        label:'ETFs',             placeholder:'e.g. VOO, QQQ, IWDA' },
    { id:'sg_etf',     label:'SG ETFs',          placeholder:'e.g. ES3, G3B, CLR' },
    { id:'unit_trust', label:'Unit Trusts (SG)', placeholder:'e.g. Nikko AM STI, PIMCO Income' },
  ];

  const presets = {
    stock:      ['Apple (AAPL)', 'NVIDIA', 'DBS Bank', 'Sea Limited', 'Grab'],
    etf:        ['VOO (S&P 500)', 'QQQ (Nasdaq)', 'IWDA (World)', 'VT (Total World)'],
    sg_etf:     ['ES3 (STI ETF)', 'G3B (Nikko STI)', 'CLR (Lion S-REIT)', 'MAS T-bills'],
    unit_trust: ['Nikko AM STI', 'PIMCO Income Fund', 'Fullerton SGD Cash', 'Infinity Global Stock'],
  };

  const lookup = async (q) => {
    if (!q.trim()) return;
    setActivePreset(q); setLoading(true); setText('');
    const typeLabel = types.find(a => a.id===assetType)?.label;
    try {
      const r = await callClaude(`Look up this ${typeLabel}: "${q}". Search for latest info. Tell me: what it is, recent performance, any news, what kind of investor it suits, and risks. Plain English. If Singapore product, mention SGD context.`, SYSTEM);
      setText(r);
    } catch(e) { setText('Couldn\'t load. Try again.'); }
    setLoading(false);
  };

  const current = types.find(a => a.id===assetType);

  return (
    <div>
      <p style={{ color:'#6b7280', fontSize:14, marginBottom:16 }}>Look up any stock, ETF, or Singapore unit trust in plain English.</p>
      <div style={{ display:'flex', gap:8, marginBottom:20, flexWrap:'wrap' }}>
        {types.map(a => <Chip key={a.id} label={a.label} active={assetType===a.id} onClick={() => { setAssetType(a.id); setText(''); setActivePreset(null); }} />)}
      </div>
      <div style={{ display:'flex', gap:10, marginBottom:16 }}>
        <input value={query} onChange={e => setQuery(e.target.value)} onKeyDown={e => e.key==='Enter' && lookup(query)} placeholder={current?.placeholder} style={{ flex:1, border:'1.5px solid #e5e7eb', borderRadius:10, padding:'11px 16px', fontSize:14, color:'#111' }}/>
        <button onClick={() => lookup(query)} style={{ background:'#6366f1', color:'#fff', border:'none', borderRadius:10, padding:'11px 22px', fontSize:14, fontWeight:600, cursor:'pointer' }}>Search</button>
      </div>
      <div style={{ display:'flex', gap:8, flexWrap:'wrap', marginBottom:24 }}>
        <span style={{ fontSize:12, color:'#9ca3af', alignSelf:'center' }}>Try:</span>
        {(presets[assetType]||[]).map(p => (
          <button key={p} onClick={() => { setQuery(p); lookup(p); }} style={{ background:activePreset===p?'#ede9fe':'#f9fafb', color:activePreset===p?'#6366f1':'#6b7280', border:`1px solid ${activePreset===p?'#c4b5fd':'#e5e7eb'}`, borderRadius:8, padding:'5px 12px', fontSize:12, cursor:'pointer' }}>{p}</button>
        ))}
      </div>
      <div style={{ background:'#fafafa', borderRadius:12, padding:24, border:'1px solid #f0f0f0', minHeight:120 }}>
        <ResultBox text={text} loading={loading} placeholder="Search for something above to get started." />
      </div>
    </div>
  );
}

// ── TAB 4: QUICK SCAN ────────────────────────────────────────────────────────

function QuickScanTab() {
  const [items, setItems] = React.useState('AAPL, MSFT, ES3.SI');
  const [text, setText] = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const [scanType, setScanType] = React.useState('overview');

  const scanTypes = [
    { id:'overview',     label:'Quick overview'    },
    { id:'performance',  label:'Recent performance' },
    { id:'news',         label:'Latest news'        },
    { id:'risk',         label:'Risk check'         },
  ];

  const scan = async () => {
    if (!items.trim()) return;
    setLoading(true); setText('');
    try {
      const r = await callClaude(`Do a "${scanType}" scan on: ${items}. Search for current info on each. For each give a 3-5 sentence summary. Use plain language. Group each with its name as a header. Note Singapore-listed context where relevant.`, SYSTEM);
      setText(r);
    } catch(e) { setText('Couldn\'t run scan. Try again.'); }
    setLoading(false);
  };

  return (
    <div>
      <p style={{ color:'#6b7280', fontSize:14, marginBottom:20 }}>Paste in a list of stocks, ETFs, or unit trusts — get a quick read on all of them at once.</p>
      <div style={{ marginBottom:16 }}>
        <label style={{ fontSize:13, fontWeight:600, color:'#374151', display:'block', marginBottom:6 }}>Your watchlist</label>
        <textarea value={items} onChange={e => setItems(e.target.value)} placeholder="e.g. AAPL, NVDA, ES3.SI, VOO, Nikko AM STI..." style={{ width:'100%', border:'1.5px solid #e5e7eb', borderRadius:10, padding:'11px 16px', fontSize:14, color:'#111', resize:'vertical', minHeight:80 }}/>
      </div>
      <div style={{ display:'flex', gap:8, marginBottom:20, flexWrap:'wrap' }}>
        {scanTypes.map(s => <Chip key={s.id} label={s.label} active={scanType===s.id} onClick={() => setScanType(s.id)} />)}
      </div>
      <button onClick={scan} disabled={loading} style={{ background:loading?'#e5e7eb':'#6366f1', color:loading?'#9ca3af':'#fff', border:'none', borderRadius:10, padding:'12px 24px', fontSize:14, fontWeight:600, cursor:loading?'not-allowed':'pointer', marginBottom:24, width:'100%' }}>
        {loading ? 'Scanning...' : `Run ${scanTypes.find(s=>s.id===scanType)?.label}`}
      </button>
      <div style={{ background:'#fafafa', borderRadius:12, padding:24, border:'1px solid #f0f0f0', minHeight:120 }}>
        <ResultBox text={text} loading={loading} placeholder="Add your investments above and run a scan." />
      </div>
    </div>
  );
}

// ── TAB 5: CLIENT LETTER ─────────────────────────────────────────────────────

function ClientLetterTab() {
  const [firmName, setFirmName] = React.useState('');
  const [advisorName, setAdvisorName] = React.useState('');
  const [clientName, setClientName] = React.useState('');
  const [month, setMonth] = React.useState(() => { const d=new Date(); return `${d.toLocaleString('default',{month:'long'})} ${d.getFullYear()}`; });
  const [focus, setFocus] = React.useState('');
  const [notes, setNotes] = React.useState('');
  const [tone, setTone] = React.useState('warm');
  const [preview, setPreview] = React.useState('');
  const [loading, setLoading] = React.useState(false);

  const tones = [
    { id:'warm',      label:'Warm & reassuring'      },
    { id:'balanced',  label:'Balanced & informative'  },
    { id:'concise',   label:'Short & to the point'    },
  ];
  const toneDesc = { warm:'empathetic and reassuring, like a trusted advisor checking in', balanced:'professional but approachable, balanced data and narrative', concise:'brief and clear, bullet-heavy, respects the client\'s time' };

  const generate = async () => {
    setLoading(true); setPreview('');
    try {
      const r = await callClaude(
        `Write a monthly investment update letter for ${month}. ${firmName?'Firm: '+firmName+'.':''} ${advisorName?'Advisor: '+advisorName+'.':''} Client: ${clientName||'Valued Client'}. Portfolio focus: ${focus||'diversified portfolio'}. ${notes?'Context: '+notes:''} Tone: ${toneDesc[tone]}. Search the web for current market conditions. Structure: warm opening, what happened in markets, news highlights by industry/theme, forward outlook, action note, warm closing. About 500 words. Write like a real human, not a corporate newsletter.`,
        `You are a warm thoughtful financial advisor writing a personal letter. Write in first person. Be honest, clear, human. No jargon. Search the web for actual market data before writing.`
      );
      setPreview(r);
    } catch(e) { setPreview('Couldn\'t generate. Please try again.'); }
    setLoading(false);
  };

  const exportDoc = () => {
    const now = new Date().toLocaleDateString('en-SG',{year:'numeric',month:'long',day:'numeric'});
    const body = preview.split('\n').filter(l=>l.trim()).map(l => {
      if (/^#{1,3}\s/.test(l)) return `<h2>${l.replace(/^#+\s*/,'')}</h2>`;
      if (/^[-•]\s/.test(l)) return `<p style="margin-left:20px">• ${l.replace(/^[-•]\s*/,'')}</p>`;
      return `<p>${l}</p>`;
    }).join('\n');
    const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{font-family:Georgia,serif;font-size:12pt;margin:1.2in 1in;color:#1a1a1a;line-height:1.7;}.firm{font-size:18pt;font-weight:bold;color:#2c3e50;}.meta{font-size:10pt;color:#888;margin-bottom:30px;}hr{border:none;border-top:1px solid #ddd;margin:20px 0;}h2{font-size:12pt;font-weight:bold;color:#2c3e50;margin:20px 0 8px;}p{margin:0 0 12px;}.footer{margin-top:40px;font-size:9pt;color:#aaa;border-top:1px solid #eee;padding-top:10px;}</style></head><body>${firmName?`<div class="firm">${firmName}</div>`:''}<div class="meta">${advisorName?advisorName+' &nbsp;|&nbsp; ':''}${month} &nbsp;|&nbsp; ${now}</div><hr><p><strong>Dear ${clientName||'Valued Client'},</strong></p>${body}<div class="footer">This letter is prepared for informational purposes only and does not constitute financial advice.</div></body></html>`;
    const blob = new Blob([html],{type:'application/msword'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download=`Investment-Update-${month.replace(/\s/g,'-')}.doc`; a.click();
    URL.revokeObjectURL(url);
  };

  const inp = { width:'100%', border:'1.5px solid #e5e7eb', borderRadius:10, padding:'10px 14px', fontSize:14, color:'#111', background:'#fff' };

  return (
    <div>
      <p style={{ color:'#6b7280', fontSize:14, marginBottom:20 }}>Fill in a few details and get a personalised monthly letter ready to send to your client.</p>
      <div style={{ background:'#fafafa', borderRadius:12, padding:24, border:'1px solid #f0f0f0', marginBottom:24 }}>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14, marginBottom:14 }}>
          <div><label style={{ fontSize:12, fontWeight:600, color:'#6b7280', display:'block', marginBottom:5 }}>Your firm name</label><input value={firmName} onChange={e=>setFirmName(e.target.value)} placeholder="e.g. Meridian Wealth" style={inp}/></div>
          <div><label style={{ fontSize:12, fontWeight:600, color:'#6b7280', display:'block', marginBottom:5 }}>Your name</label><input value={advisorName} onChange={e=>setAdvisorName(e.target.value)} placeholder="e.g. Sarah Lim, CFP" style={inp}/></div>
          <div><label style={{ fontSize:12, fontWeight:600, color:'#6b7280', display:'block', marginBottom:5 }}>Client name</label><input value={clientName} onChange={e=>setClientName(e.target.value)} placeholder="e.g. Mr and Mrs Tan" style={inp}/></div>
          <div><label style={{ fontSize:12, fontWeight:600, color:'#6b7280', display:'block', marginBottom:5 }}>Month</label><input value={month} onChange={e=>setMonth(e.target.value)} style={inp}/></div>
        </div>
        <div style={{ marginBottom:14 }}><label style={{ fontSize:12, fontWeight:600, color:'#6b7280', display:'block', marginBottom:5 }}>Portfolio focus</label><input value={focus} onChange={e=>setFocus(e.target.value)} placeholder="e.g. 60/40 equities and bonds, Singapore REITs, long-term growth" style={inp}/></div>
        <div style={{ marginBottom:20 }}><label style={{ fontSize:12, fontWeight:600, color:'#6b7280', display:'block', marginBottom:5 }}>Anything specific to mention? <span style={{fontWeight:400}}>(optional)</span></label><textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="e.g. Client nervous about rate cuts, recently added to REITs..." style={{...inp, minHeight:70, resize:'vertical'}}/></div>
        <div style={{ marginBottom:20 }}>
          <label style={{ fontSize:12, fontWeight:600, color:'#6b7280', display:'block', marginBottom:8 }}>Letter tone</label>
          <div style={{ display:'flex', gap:8 }}>{tones.map(t => <Chip key={t.id} label={t.label} active={tone===t.id} onClick={()=>setTone(t.id)}/>)}</div>
        </div>
        <button onClick={generate} disabled={loading} style={{ background:loading?'#e5e7eb':'#6366f1', color:loading?'#9ca3af':'#fff', border:'none', borderRadius:10, padding:'13px 0', fontSize:14, fontWeight:600, cursor:loading?'not-allowed':'pointer', width:'100%' }}>
          {loading ? 'Writing your letter...' : 'Generate letter'}
        </button>
      </div>
      {(preview||loading) && (
        <div>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
            <span style={{ fontSize:13, fontWeight:600, color:'#374151' }}>Preview</span>
            {preview && !loading && <button onClick={exportDoc} style={{ background:'#fff', color:'#6366f1', border:'1.5px solid #6366f1', borderRadius:8, padding:'7px 16px', fontSize:13, fontWeight:600, cursor:'pointer' }}>⬇ Download as Word</button>}
          </div>
          <div style={{ background:'#fff', borderRadius:12, padding:'40px 48px', border:'1px solid #e5e7eb', boxShadow:'0 4px 24px rgba(0,0,0,.06)', fontFamily:'Georgia,serif' }}>
            {firmName && <div style={{ fontSize:18, fontWeight:700, color:'#2c3e50', marginBottom:2 }}>{firmName}</div>}
            {advisorName && <div style={{ fontSize:12, color:'#9ca3af', marginBottom:24 }}>{advisorName} · {month}</div>}
            <div style={{ borderTop:'1px solid #e5e7eb', marginBottom:20 }}/>
            {loading ? <Spinner color="#6366f1"/> : <ResultBox text={preview} loading={false} placeholder=""/>}
            {preview && !loading && <div style={{ marginTop:32, paddingTop:16, borderTop:'1px solid #f0f0f0', fontSize:11, color:'#d1d5db' }}>For informational purposes only. Not financial advice.</div>}
          </div>
        </div>
      )}
    </div>
  );
}

  const [tab, setTab] = React.useState(0);
  return (
    <div style={{ background:'#f8f7f5', minHeight:'100vh' }}>
      <div style={{ background:'#fff', borderBottom:'1px solid #f0f0f0', padding:'18px 32px', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div>
          <div style={{ fontSize:20, fontFamily:"'DM Serif Display',serif", color:'#111827', letterSpacing:'-0.3px' }}>Clearview <span style={{ color:'#6366f1' }}>Insights</span></div>
          <div style={{ fontSize:11, color:'#9ca3af', marginTop:1 }}>Your markets, in plain English</div>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <div style={{ width:7, height:7, borderRadius:'50%', background:'#10b981' }}/>

      </div>
      <div style={{ background:'#fff', borderBottom:'1px solid #f0f0f0', padding:'0 32px', display:'flex', overflowX:'auto' }}>
        {TABS.map((t,i) => (
          <button key={t.id} onClick={() => setTab(i)} style={{ background:'transparent', border:'none', borderBottom:`2px solid ${tab===i?'#6366f1':'transparent'}`, color:tab===i?'#6366f1':'#6b7280', padding:'14px 16px', fontSize:13, fontWeight:tab===i?600:400, cursor:'pointer', whiteSpace:'nowrap', display:'flex', alignItems:'center', gap:6 }}>
            <span>{t.emoji}</span>{t.label}

      <div style={{ maxWidth:860, margin:'0 auto', padding:'32px 24px', animation:'fadeIn 0.25s ease' }}>

  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
